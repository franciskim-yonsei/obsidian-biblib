name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-plugin:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm ci

      - run: npm run build

      - uses: actions/upload-artifact@v4
        with:
          name: plugin
          path: |
            main.js
            manifest.json
            styles.css

  build-binaries:
    uses: ./.github/workflows/build-node-pty.yml
    with:
      node-pty-version: "1.1.0"

  release:
    needs: [build-plugin, build-binaries]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            main.js
            manifest.json
            styles.css
            node-pty-*.zip
            checksums.json
          generate_release_notes: true
